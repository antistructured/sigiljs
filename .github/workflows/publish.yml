name: Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Verify npm and JSR versions match
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          JSR_VERSION="$(node -e "console.log(JSON.parse(require('fs').readFileSync('jsr.json', 'utf8')).version)")"

          if [ "$PACKAGE_VERSION" != "$JSR_VERSION" ]; then
            echo "package.json version ($PACKAGE_VERSION) does not match jsr.json version ($JSR_VERSION)"
            exit 1
          fi

          echo "Versions match: $PACKAGE_VERSION"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run release checks
        run: bun run check:release

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs:
      - verify

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node for npm registry
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Read package metadata
        id: package
        shell: bash
        run: |
          NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"

          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          echo "Package: $NAME@$VERSION"

      - name: Check whether npm version already exists
        id: npm_version
        shell: bash
        run: |
          NAME="${{ steps.package.outputs.name }}"
          VERSION="${{ steps.package.outputs.version }}"

          if npm view "$NAME@$VERSION" version --registry=https://registry.npmjs.org > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "$NAME@$VERSION already exists on npm. Skipping npm publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "$NAME@$VERSION does not exist on npm. Publishing is allowed."
          fi

      - name: Publish to npm
        if: steps.npm_version.outputs.exists == 'false'
        run: npm publish --access public

  publish-jsr:
    name: Publish to JSR
    runs-on: ubuntu-latest
    needs:
      - verify

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Read JSR package metadata
        id: jsr
        shell: bash
        run: |
          NAME="$(node -e "console.log(JSON.parse(require('fs').readFileSync('jsr.json', 'utf8')).name)")"
          VERSION="$(node -e "console.log(JSON.parse(require('fs').readFileSync('jsr.json', 'utf8')).version)")"

          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          echo "JSR package: $NAME@$VERSION"

      - name: Publish to JSR
        run: npx jsr publish
